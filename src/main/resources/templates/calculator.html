<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
</head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
      integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
<body>
<div class="container">
    <div class="row mt-5">
        <div class="col-md-6 offset-md-3">
            <form th:action="@{/calculator}" method="POST">
                <div class="form-group">
                    <label for="exampleInputEmail1">Enter Number 1</label>
                    <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                           name="number1" placeholder="Enter Number 1">

                </div>
                <div class="form-group">
                    <label for="exampleInputPassword1">Enter Number 2</label>
                    <input type="text" class="form-control" id="exampleInputPassword1" name="number2"
                           placeholder="Enter Number 2">
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="operation" id="exampleRadios1" value="+">
                    <label class="form-check-label" for="exampleRadios1">
                        Addition
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="operation" id="exampleRadios2" value="-">
                    <label class="form-check-label" for="exampleRadios2">
                        Subtraction
                    </label>
                </div>
                <div class="form-check disabled">
                    <input class="form-check-input" type="radio" name="operation" id="exampleRadios3" value="*">
                    <label class="form-check-label" for="exampleRadios3">
                        Multiplication
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="operation" id="exampleRadios4" value="/">
                    <label class="form-check-label" for="exampleRadios1">
                        Division
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
                <label> Results :<p th:text="${result}"></p></label>
            </form>

        </div>
    </div>
</div>
