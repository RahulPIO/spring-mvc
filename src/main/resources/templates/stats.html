<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Stats</title>
    <style>
        *{
             margin:0;
             padding:0;
         }
         .main-cont {
             width:100vw;
             height:100vh;
             display:flex;
             align-items:center;
             justify-content:center;
         }
         .stats-cont {
                 width:50%;
                 height:50%;
                 display:flex;
                 flex-direction:column;
                 align-items:center;
                 justify-content:center;
                 top-margin:10rem;
                 gap:1rem;
                 background-color:black;
                 color:white;
                 border-radius:2rem;
         }
    </style>
</head>
<body>
<div class="main-cont">
    <h2 th:text="${message}"></h2>
    <div class="stats-cont" th:object="${matchStats}">
        <h2><h2 th:text="*{format}"></h2> Details</h2>
        <label> Matches Played : <strong th:text="*{matches}"></strong> </label>
        <br>
        <label> Runs Scored : <strong th:text="*{runsScored}"></strong> </label>
        <br>
        <label> StrikeRate : <strong th:text="*{strikeRate}"></strong> </label>
        <br>
        <label> Average : <strong th:text="*{average}"></strong> </label>
    </div>
</div>
</body>
</html>
