<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Customer</title>
</head>
<body>
    <div th:each="customer : ${customerList}">
        <p  Customer Id : ><strong th:text="${customer.id}"> </strong></p>
        <p  Customer Name : ><strong th:text="${customer.name}"> </strong></p>
    </div>
</body>
</html>
